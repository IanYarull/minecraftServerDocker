services:

  # --- Wireguard VPN for proxy services (Optional) ---

  wireguard:

    build: ./vpnContainer/

    container_name: wireguard_service

    cap_add:
      - NET_ADMIN
      - SYS_MODULE

    ports:
      - "25565:25565"

    volumes:
      - ./vpnContainer/config:/etc/wireguard
      - /lib/modules:/lib/modules:ro

    sysctls:
      - net.ipv4.ip_forward=1

    restart: unless-stopped

  # --- Minecraft Server ---

  minecraft:

    build: ./minecraftServer/

    container_name: minecraftServer

    working_dir: /minecraft

    stdin_open: true # Lets you input

    tty: true        # Lets you terminal in for server admin commands

    network_mode: "service:wireguard" #Uses wireguard for networking with a proxy, optional

    volumes:

      # Folder volumes for world data

      - ./minecraftServer/data/world:/minecraft/world
      - ./minecraftServer/data/mods:/minecraft/mods
      - ./minecraftServer/data/config:/minecraft/config
      - ./minecraftServer/data/logs:/minecraft/logs

      # Folder volume for neoforge library

      - ./minecraftServer/libraries:/minecraft/libraries

      # File imports from instance specific configs

      - ./minecraftServer/server.properties:/minecraft/server.properties
      - ./minecraftServer/user_jvm_args.txt:/minecraft/user_jvm_args.txt
      - ./minecraftServer/whitelist.json:/minecraft/whitelist.json
      - ./minecraftServer/banned-players.json:/minecraft/banned-players.json
      - ./minecraftServer/banned-ips.json:/minecraft/banned-ips.json
      - ./minecraftServer/usercache.json:/minecraft/usercache.json
      - ./minecraftServer/ops.json:/minecraft/ops.json
      - ./minecraftServer/server-icon.png:/minecraft/server-icon.png

    restart: unless-stopped

  # --- Backup Services ---

  backup_service:

    build: ./backupService

    container_name: backupService

    volumes:

      # Volume to be able to read server files, read only of course

      - ./minecraftServer:/server_files:ro

      - ./minecraftBackups:/backups

    depends_on:

      - minecraft

    restart: unless-stopped
